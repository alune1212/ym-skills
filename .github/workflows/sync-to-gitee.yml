name: Sync to Gitee

on:
  push:
    branches:
      - main   # 改成你的默认分支名，如 master
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          test -n "$GITEE_PRIVATE_KEY" || {
            echo "::error::Missing required secret: GITEE_PRIVATE_KEY"
            exit 1
          }
          test -n "$GITEE_TOKEN" || {
            echo "::error::Missing required secret: GITEE_TOKEN"
            exit 1
          }

      - name: Mirror to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/alune1212
          dst: gitee/alune
          account_type: user
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "ym-skills"   # 只同步指定仓库
          force_update: true
          debug: true
